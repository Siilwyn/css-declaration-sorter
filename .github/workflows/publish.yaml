name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Publish package
        run: npm publish
